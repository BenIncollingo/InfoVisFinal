<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Information Visualization Final</title>

  <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-50">
  <!-- Top header for switching between the Heatmap and Schedule pages -->
  <div class="flex gap-1 p-2 bg-white border-b">
    <button data-tab="heatmap" class="tab px-3 py-1 rounded text-sm bg-[#9D2235] text-white">
      Heatmap
    </button>

    <button data-tab="schedule" class="tab px-3 py-1 rounded text-sm text-gray-600 hover:bg-gray-100">
      Schedule
    </button>
  </div>

  <!-- Heatmap page -->
  <div id="heatmap" class="tab-panel">
    <div class="flex items-center gap-2 px-4 py-2 border-b bg-white">
      <!-- Course level filter buttons -->
      <div id="levels" class="flex gap-1">
        <button value="all" class="level-btn px-3 py-1 rounded-full text-xs border bg-[#9D2235] text-white border-[#9D2235]">
          All
        </button>

        <button value="1000" class="level-btn px-3 py-1 rounded-full text-xs border bg-white text-gray-600 border-gray-300">
          1000s
        </button>

        <button value="2000" class="level-btn px-3 py-1 rounded-full text-xs border bg-white text-gray-600 border-gray-300">
          2000s
        </button>

        <button value="3000" class="level-btn px-3 py-1 rounded-full text-xs border bg-white text-gray-600 border-gray-300">
          3000s
        </button>

        <button value="4000" class="level-btn px-3 py-1 rounded-full text-xs border bg-white text-gray-600 border-gray-300">
          4000s
        </button>
      </div>
    </div>

    <div class="overflow-auto p-4">
      <!-- D3 draws the heatmap inside this SVG -->
      <svg id="heatmap-svg"></svg>
    </div>
  </div>

  <!-- Schedule page -->
  <div id="schedule" class="tab-panel hidden">
    <div class="flex gap-4 p-4">
      <!-- Course selection area -->
      <div class="flex-1 bg-white border rounded-lg p-3 max-h-[85vh] overflow-auto">
        <div class="text-sm font-semibold mb-2">Click courses to add</div>
        <div id="course-list" class="space-y-1"></div>
      </div>

      <!-- Right side area with the gauge and selected courses -->
      <div class="w-96 space-y-3">
        <div class="bg-white border rounded-lg p-3 flex flex-col items-center">
          <!-- D3 draws the difficulty gauge inside this SVG -->
          <svg id="gauge" viewBox="0 0 200 120" class="w-64"></svg>

          <div id="avg-number" class="text-2xl font-bold text-gray-400">—</div>
          <div class="text-xs text-gray-500">Avg semester difficulty</div>
        </div>

        <!-- Selected courses area -->
        <div id="selected" class="bg-white border rounded-lg p-3 space-y-3 max-h-[55vh] overflow-auto">
          <div class="text-xs text-gray-400 text-center py-8">
            Click courses on the left.
          </div>
        </div>
      </div>
    </div>
  </div>

  <script type="module" src="./heatmap.js"></script>
  <script type="module" src="./schedule.js"></script>

  <script type="module">
    // Handles switching between the Heatmap and Schedule tabs
    document.querySelectorAll(".tab").forEach(btn => {
      btn.onclick = () => {
        document.querySelectorAll(".tab").forEach(b => {
          b.classList.remove("bg-[#9D2235]", "text-white");
          b.classList.add("text-gray-600", "hover:bg-gray-100");
        });

        btn.classList.add("bg-[#9D2235]", "text-white");
        btn.classList.remove("text-gray-600", "hover:bg-gray-100");

        document.querySelectorAll(".tab-panel").forEach(panel => {
          panel.classList.add("hidden");
        });

        document.getElementById(btn.dataset.tab).classList.remove("hidden");
      };
    });
  </script>
</body>
</html>
